<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistro App - Legal & Policies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #fef9f5 0%, #faf5f0 50%, #f8f2ed 100%);
            background-attachment: fixed;
            color: #333333;
            overflow-x: hidden;
            min-height: 100vh;
        }
        /* Background Mesh Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
        }
        .orb-1 { width: 400px; height: 400px; background: #ff9e7a; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #ff632e; bottom: -150px; right: -100px; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,1);
            border-radius: 24px;
        }
        
        .btn-glass {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            color: #333333;
        }
        .btn-glass:hover {
            background: rgba(0, 0, 0, 0.08);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center">
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="container mx-auto px-4 py-20 flex flex-col items-center justify-center min-h-screen z-10">
        <div class="glass-card max-w-2xl w-full p-10 md:p-16 text-center will-change-transform opacity-0" id="main-card">
            
            <div class="w-20 h-20 mb-8 mx-auto animate-item opacity-0 transform translate-y-8">
                <img src="icon.png" alt="Vistro Icon" class="w-full h-full object-contain rounded-2xl shadow-lg">
            </div>

            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-4 text-gray-900 animate-item opacity-0 transform translate-y-8">
                Vistro
            </h1>
            <p class="text-xl text-gray-600 mb-12 max-w-xl mx-auto font-light animate-item opacity-0 transform translate-y-8">
                Legal and Policy Documentation
            </p>
            
            <div class="flex flex-col sm:flex-row gap-6 justify-center animate-item opacity-0 transform translate-y-8">
                <a href="./privacy.html" class="btn-glass font-semibold py-4 px-8 rounded-xl flex-1 max-w-[200px] text-center mx-auto sm:mx-0">
                    Privacy Policy
                </a>
                <a href="./terms.html" class="btn-glass font-semibold py-4 px-8 rounded-xl flex-1 max-w-[200px] text-center mx-auto sm:mx-0">
                    Terms of Service
                </a>
            </div>

            <div class="mt-16 pt-8 border-t border-gray-300 animate-item opacity-0 transform translate-y-8">
                <p class="text-sm text-gray-500">
                    Questions or need help? 
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLScnin8W1DXBGTnwMUXqss45zqT_AWLb-AKzp4FHph5dOnJEew/viewform" target="_blank" rel="noopener noreferrer" style="color: #ff632e;" class="hover:opacity-80 transition-opacity font-semibold">Contact Support</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.to("#main-card", {
                duration: 1.2,
                y: 0,
                opacity: 1,
                ease: "power4.out"
            });
            
            gsap.to(".animate-item", {
                duration: 1,
                y: 0,
                opacity: 1,
                stagger: 0.15,
                ease: "power3.out",
                delay: 0.3
            });
        });
    </script>
</body>
</html>
